    <style amp-custom>
        * { box-sizing: border-box; }

        /* =============================================
           BACKGROUND TERANG - gradient emas & krem hangat
           ============================================= */
        body {
            font-family: monospace;
            position: relative;
            background: linear-gradient(135deg,
                #fff5e6 0%,
                #ffe0b2 25%,
                #ffd180 50%,
                #ffcc80 70%,

        }

        .container {
            max-width: 400px;
            height: 100vh;
            margin: 0 auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;

        /* =============================================

           ============================================= */
        header {
            background: linear-gradient(to right, #8b0000, #cc0000);
            box-shadow: 0 4px 12px rgba(139,0,0,0.5);
            border-bottom: 3px solid #ff4444;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        header .header-wrapper {
            margin: 0 auto;
            max-width: 960px;
        }

        header .header-wrapper .logo {
            display: flex;
            justify-content: center;
            position: relative;
            padding: 6px 0;
        }

        /* =============================================
           BANNER
           ============================================= */
        .banner {
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: borderPulse 1.5s infinite ease-out;
        }

        @keyframes borderPulse {
            0%   { filter: drop-shadow(0px 0px 3px #ff4400); }
            50%  { filter: drop-shadow(0px 0px 14px #ff8800); }
            100% { filter: drop-shadow(0px 0px 3px #ff4400); }
        }

        .banner:hover {
            animation: none;
            filter: brightness(1.05) drop-shadow(0px 0px 12px #ff6600);
        }

        /* =============================================
           CARD KONTEN
           ============================================= */
        #card {

            border: 2px solid rgba(180, 60, 0, 0.3);
            border-radius: 16px;

            box-shadow: 0 6px 24px rgba(180, 80, 0, 0.18);

        /* =============================================
           ANIMASI TOMBOL LOGIN — Biru terang berkilau
           ============================================= */
        @keyframes flash_login {
            0%   {

                box-shadow: 0 0 8px 2px rgba(0,100,255,0.5);

            30%  {

                box-shadow: 0 0 28px 10px rgba(100,160,255,0.9), 0 0 55px 18px rgba(80,130,255,0.5);

            50%  {

                box-shadow: 0 0 45px 18px rgba(180,210,255,1), 0 0 90px 35px rgba(120,170,255,0.7);

            70%  {

                box-shadow: 0 0 28px 10px rgba(100,160,255,0.9), 0 0 55px 18px rgba(80,130,255,0.5);
                color: #ffffff;
            }
            100% {

                box-shadow: 0 0 8px 2px rgba(0,100,255,0.5);
                color: #ffffff;

        /* =============================================
